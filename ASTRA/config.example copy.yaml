# ASTRA Phase 1 Configuration File
# Application Security Threat & Risk Assessment

# Dynatrace Connection Configuration
dynatrace:
  # Your Dynatrace environment URL (without trailing slash)
  environment: "https://your-tenant.live.dynatrace.com"
  
  # API Token with required permissions:
  # - Read security problems (securityProblems.read)
  # - Read entities (entities.read)
  # Use environment variable for security: export DT_API_TOKEN="your-token"
  api_token: "${DT_API_TOKEN}"
  
  # SSL certificate verification (set to false for self-signed certs)
  verify_ssl: true

# Assessment Configuration
assessment:
  # Timeframe for vulnerability data collection
  # Examples: "now-30d", "now-1w", "now-90d"
  timeframe: "now-30d"
  
  # Risk scoring model to use
  # Options: "CWRS" (Composite Weighted Risk Score)
  # Future: "REI" (Risk Exposure Index), "HRP" (Holistic Risk Posture)
  risk_model: "CWRS"

# Filter Configuration
# Define which entities to include in the assessment
filters:
  # Entity type to analyze
  # Options: "process_group", "host", "application", "management_zone"
  type: "process_group"
  
  # Specific entity IDs to include (empty = all entities)
  # Example: ["PROCESS_GROUP-1234567890ABCDEF", "PROCESS_GROUP-FEDCBA0987654321"]
  ids: []
  
  # Filter by Management Zone names (empty = all zones)
  # Example: ["Production", "CustomerFacing", "CriticalApps"]
  management_zones: []
  
  # Filter by entity tags (empty = all)
  # Example: ["Environment:Production", "App:WebPortal"]
  tags: []

# Risk Scoring Configuration (CWRS Model)
# Weights must sum to 100%
scoring:
  # Vulnerability Severity Score (0-40 points)
  # Based on CVE severity levels (Critical/High/Medium/Low)
  vulnerability_weight: 40
  
  # Exploitability Factor (0-25 points)
  # Public exposure, known exploits, vulnerable function usage
  exploitability_weight: 25
  
  # Attack Complexity & Exposure (0-20 points)
  # Network entry points, vulnerable libraries, database connections
  exposure_weight: 20
  
  # System Criticality & Usage (0-15 points)
  # Production environment, process count, resource usage
  criticality_weight: 15

# Output Configuration
output:
  # Directory for JSON report output
  json_path: "./reports"
  
  # Directory for PDF report output
  pdf_path: "./reports"
  
  # Filename prefix for generated reports
  # Actual filename: <prefix>_YYYYMMDD_HHMMSS.json|pdf
  filename_prefix: "astra_report"

# Advanced Options (Optional)
advanced:
  # Maximum number of entities to include in detailed PDF report
  # Set to prevent PDF size issues with large environments
  max_entities_in_pdf: 50
  
  # Enable detailed vulnerability logging
  verbose_logging: false
  
  # Include zero-vulnerability entities in report
  include_clean_entities: false
